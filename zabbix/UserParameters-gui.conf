UserParameter=opnsense.pf.states.current,/usr/local/bin/sudo /sbin/pfctl -si | /usr/bin/awk 'BEGIN {found=0} /current entries/ {print $3; found=1; exit} END {if (found==0) print 0}'
UserParameter=opnsense.pf.states.max,/usr/local/bin/sudo /sbin/pfctl -sm | /usr/bin/awk 'BEGIN {found=0} /^states[[:space:]]+hard limit/ {print $4; found=1; exit} END {if (found==0) print 0}'
UserParameter=opnsense.carp.master.count,ifconfig | awk '/carp: .*MASTER/ {c++} END {print c+0}'
UserParameter=opnsense.carp.backup.count,ifconfig | awk '/carp: .*BACKUP/ {c++} END {print c+0}'
UserParameter=opnsense.route.default.present,route -n get default | awk '/gateway:/ {found=1} END {if (found) print 1; else print 0}'
UserParameter=opnsense.openvpn.processes,/usr/local/bin/sudo /bin/pgrep -f '/usr/local/sbin/openvpn' | awk 'END {print NR+0}'
UserParameter=opnsense.unbound.processes,/usr/local/bin/sudo /bin/pgrep -f '/usr/local/sbin/unbound' | awk 'END {print NR+0}'
UserParameter=opnsense.dhcp.leases,awk '/^lease / {c++} END {print c+0}' /var/dhcpd/var/db/dhcpd.leases 2>/dev/null
UserParameter=opnsense.pf.states.percent,/bin/sh -c 'cur=$(/usr/local/bin/sudo /sbin/pfctl -si | /usr/bin/awk "BEGIN {f=0} /current entries/ {print \$3; f=1; exit} END {if (f==0) print 0}"); max=$(/usr/local/bin/sudo /sbin/pfctl -sm | /usr/bin/awk "BEGIN {f=0} /^states[[:space:]]+hard limit/ {print \$4; f=1; exit} END {if (f==0) print 0}"); if [ "$max" -gt 0 ]; then echo "$cur $max" | /usr/bin/awk "{printf \"%.2f\", (\$1*100)/\$2}"; else echo 0; fi'
UserParameter=opnsense.gateway.discovery,/usr/local/bin/opnsense-zabbix.sh gateway_discovery
UserParameter=opnsense.unbound.status,/usr/local/bin/sudo /bin/pgrep -f '/usr/local/sbin/unbound' | awk 'END {if (NR>0) print 1; else print 0}'
UserParameter=opnsense.ipsec.established,ipsec statusall 2>/dev/null | awk '/ESTABLISHED/ {c++} END {print c+0}'
UserParameter=opnsense.gateway.wan.statuscode,/usr/local/bin/opnsense-zabbix.sh gateway_metric WAN_GW status
UserParameter=opnsense.ssl.cert.days,/usr/local/bin/opnsense-zabbix.sh ssl_cert_days_remaining
UserParameter=opnsense.pf.counter.memory,/usr/local/bin/sudo /sbin/pfctl -si | /usr/bin/awk 'BEGIN {found=0} /^[[:space:]]+memory[[:space:]]+/ {print $2; found=1; exit} END {if (found==0) print 0}'
UserParameter=opnsense.pf.counter.state-limit,/usr/local/bin/sudo /sbin/pfctl -si | /usr/bin/awk 'BEGIN {found=0} /^[[:space:]]+state-limit[[:space:]]+/ {print $2; found=1; exit} END {if (found==0) print 0}'
