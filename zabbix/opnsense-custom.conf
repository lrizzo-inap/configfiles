# OPNsense Zabbix UserParameters
# Place in: /usr/local/etc/zabbix_agentd.conf.d/opnsense-custom.conf
# Requires: "Enable sudo root permissions" in Services -> Zabbix Agent -> Settings

# --- Packet Filter ---
UserParameter=opnsense.pf.states.current,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_states_current
UserParameter=opnsense.pf.states.max,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_states_max
UserParameter=opnsense.pf.states.percent,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_states_percent
UserParameter=opnsense.pf.counter.dropped,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_counter dropped
UserParameter=opnsense.pf.counter.memory,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_counter memory
UserParameter=opnsense.pf.counter.state-limit,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh pf_counter state-limit

# --- CARP ---
UserParameter=opnsense.carp.master.count,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh carp_master_count
UserParameter=opnsense.carp.backup.count,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh carp_backup_count

# --- Routing ---
UserParameter=opnsense.route.default.present,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh default_route_present

# --- VPN ---
UserParameter=opnsense.ipsec.established,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh ipsec_established
UserParameter=opnsense.openvpn.processes,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh openvpn_processes

# --- DNS ---
UserParameter=opnsense.unbound.processes,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh unbound_processes

# --- DHCP ---
UserParameter=opnsense.dhcp.leases,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh dhcp_leases

# --- Gateways (LLD) ---
UserParameter=opnsense.gateway.discovery,/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh gateway_discovery
UserParameter=opnsense.gateway.loss[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" loss
UserParameter=opnsense.gateway.delay[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" delay
UserParameter=opnsense.gateway.status[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" status_translated

# --- Interfaces (LLD) ---
UserParameter=opnsense.if.inerrors[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh if_inerrors "$1"
UserParameter=opnsense.if.idrop[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh if_idrop "$1"
UserParameter=opnsense.if.outerrors[*],/usr/local/bin/sudo /usr/local/bin/opnsense-zabbix.sh if_outerrors "$1"
