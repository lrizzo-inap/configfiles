# OPNsense Zabbix UserParameters
# Place in: /usr/local/etc/zabbix_agentd.conf.d/opnsense-custom.conf
# Requires: "Enable sudo root permissions" in Services -> Zabbix Agent -> Settings

# --- Packet Filter ---
UserParameter=opnsense.pf.states.current,sudo /usr/local/bin/opnsense-zabbix.sh pf_states_current
UserParameter=opnsense.pf.states.max,sudo /usr/local/bin/opnsense-zabbix.sh pf_states_max
UserParameter=opnsense.pf.states.percent,sudo /usr/local/bin/opnsense-zabbix.sh pf_states_percent
UserParameter=opnsense.pf.counter.dropped,sudo /usr/local/bin/opnsense-zabbix.sh pf_counter dropped
UserParameter=opnsense.pf.counter.memory,sudo /usr/local/bin/opnsense-zabbix.sh pf_counter memory
UserParameter=opnsense.pf.counter.state-limit,sudo /usr/local/bin/opnsense-zabbix.sh pf_counter state-limit

# --- CARP ---
UserParameter=opnsense.carp.master.count,sudo /usr/local/bin/opnsense-zabbix.sh carp_master_count
UserParameter=opnsense.carp.backup.count,sudo /usr/local/bin/opnsense-zabbix.sh carp_backup_count

# --- Routing ---
UserParameter=opnsense.route.default.present,sudo /usr/local/bin/opnsense-zabbix.sh default_route_present

# --- VPN ---
UserParameter=opnsense.ipsec.established,sudo /usr/local/bin/opnsense-zabbix.sh ipsec_established
UserParameter=opnsense.openvpn.processes,sudo /usr/local/bin/opnsense-zabbix.sh openvpn_processes

# --- DNS ---
UserParameter=opnsense.unbound.processes,sudo /usr/local/bin/opnsense-zabbix.sh unbound_processes

# --- DHCP ---
UserParameter=opnsense.dhcp.leases,sudo /usr/local/bin/opnsense-zabbix.sh dhcp_leases

# --- Gateways (LLD) ---
UserParameter=opnsense.gateway.discovery,sudo /usr/local/bin/opnsense-zabbix.sh gateway_discovery
UserParameter=opnsense.gateway.loss[*],sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" loss
UserParameter=opnsense.gateway.delay[*],sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" delay
UserParameter=opnsense.gateway.status[*],sudo /usr/local/bin/opnsense-zabbix.sh gateway_metric "$1" status_translated

# --- Interfaces (LLD) ---
UserParameter=opnsense.if.inerrors[*],sudo /usr/local/bin/opnsense-zabbix.sh if_inerrors "$1"
UserParameter=opnsense.if.idrop[*],sudo /usr/local/bin/opnsense-zabbix.sh if_idrop "$1"
UserParameter=opnsense.if.outerrors[*],sudo /usr/local/bin/opnsense-zabbix.sh if_outerrors "$1"
